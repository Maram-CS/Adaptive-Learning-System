<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduphin | Create New Quiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ─── COLOR VARIABLES (matching courses page) ─────────────────────────────── */
        :root {
            --blue-light:  #deeaf9;
            --blue-main:   #2b7de9;
            --blue-dark:   #053672;
            --orange:      #f4a640;
            --navy:        #0c1e36;
            --text-dark:   #1f2d3d;
            --text-muted:  #555;
            --bg-light:    #f8fbff;
            --star-on:     #f4a640;
            --star-off:    #ddd;
            --white:       #ffffff;
            --shadow-sm: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 25px rgba(0,0,0,0.08);
            --radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .page-container {
            display: flex;
            min-height: 100vh;
        }

        /* ─── SIDEBAR (identical to courses page design) ─────────────────────────── */
        .sidebar {
            width: 260px;
            background: var(--navy);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            gap: 30px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            transition: transform 0.3s ease;
            z-index: 999;
        }

        .sidebar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            color: white;
            padding: 8px 12px;
            border-radius: 40px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .sidebar .logo:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(3px);
        }

        .sidebar .logo .logo-img {
            width: 40px;
            height: auto;
        }

        .sidebar .menu ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar .menu ul li {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .sidebar .menu ul li::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(43,125,233,0.3), transparent);
            transition: left 0.4s ease;
        }

        .sidebar .menu ul li:hover::before {
            left: 100%;
        }

        .sidebar .menu ul li::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 3px;
            height: 60%;
            background: var(--orange);
            border-radius: 3px;
            transition: transform 0.3s ease;
        }

        .sidebar .menu ul li:hover::after {
            transform: translateY(-50%) scaleY(1);
        }

        .sidebar .menu ul li.active {
            background: var(--blue-main);
            color: white;
        }

        .sidebar .menu ul li.active::after {
            transform: translateY(-50%) scaleY(1);
            background: white;
        }

        .sidebar .menu ul li a {
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            z-index: 1;
        }

        .logout-btn {
            margin-top: auto;
            background: var(--orange);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: var(--navy);
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .logout-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s;
        }

        .logout-btn:hover::before {
            left: 100%;
        }

        .logout-btn:hover {
            background: var(--blue-main);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(43,125,233,0.4);
        }

        /* ─── MAIN CONTENT ────────────────────────────────────────── */
        .main {
            margin-left: 260px;
            flex: 1;
            padding: 30px 40px;
        }

        /* ─── HEADER (matching courses page) ──────────────────────────────────────── */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--blue-light);
            padding: 18px 25px;
            border-radius: 14px;
            margin-bottom: 25px;
            box-shadow: var(--shadow-sm);
        }

        .main-header h2 { font-size: 24px; color: var(--blue-dark); }
        .main-header h2 span { color: var(--orange); }

        .header-actions { display: flex; align-items: center; gap: 15px; }

        .search-bar {
            padding: 9px 16px 9px 38px;
            border: 2px solid var(--blue-main);
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%23666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 12px center;
            transition: all 0.3s ease;
            width: 240px;
        }

        .search-bar:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(244,166,64,0.2);
            width: 280px;
        }

        .icon-btn {
            background: white;
            border: 2px solid var(--blue-light);
            border-radius: 50%;
            width: 40px; height: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }

        .icon-btn:hover {
            background: var(--blue-light);
            border-color: var(--blue-main);
            transform: scale(1.1);
        }

        /* ─── Quiz Form Grid ────────────────────────────────────────── */
        .quiz-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }

        .quiz-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-md);
            border-top: 4px solid var(--blue-light);
            transition: var(--transition);
        }

        .quiz-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(43,125,233,0.12);
            border-top-color: var(--orange);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--blue-dark);
        }

        .field-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2edf7;
            border-radius: 12px;
            font-size: 15px;
            transition: var(--transition);
            background: #f9fcff;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--blue-main);
            background: white;
            outline: none;
            box-shadow: 0 0 0 3px rgba(43,125,233,0.1);
        }

        /* Type Selector */
        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .type-pill {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #f1f5f9;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            border: 2px solid transparent;
        }

        .type-pill.active {
            background: var(--blue-light);
            border-color: var(--blue-main);
            color: var(--blue-main);
        }

        /* Buttons (matching courses page with effects) */
        .btn-primary {
            background: linear-gradient(135deg, var(--blue-main), var(--blue-dark));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(5,54,114,0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(43,125,233,0.4);
            background: var(--orange);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-success::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-success:hover::before {
            left: 100%;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #e2e8f0;
            color: var(--text-muted);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-outline:hover {
            background: #f8fafc;
            border-color: var(--blue-main);
            color: var(--blue-main);
            transform: translateY(-2px);
        }

        /* Question List */
        .question-item {
            background: #f9fcff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid var(--blue-main);
            transition: var(--transition);
            position: relative;
        }

        .question-item:hover {
            transform: translateX(5px);
            background: white;
            box-shadow: var(--shadow-sm);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .question-type-badge {
            background: var(--blue-light);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--blue-dark);
        }

        .delete-question {
            background: none;
            border: none;
            color: #e53e3e;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .delete-question:hover {
            transform: scale(1.2);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            border: 2px dashed #e2edf7;
            border-radius: var(--radius-lg);
            color: var(--text-muted);
        }

        /* Toast Notification */
        .fav-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--navy);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .fav-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar span, .sidebar .logo span { display: none; }
            .main { margin-left: 80px; padding: 20px; }
            .quiz-grid { grid-template-columns: 1fr !important; }
        }

        @media (max-width: 768px) {
            .main-header { flex-direction: column; gap: 15px; text-align: center; }
            .search-bar { width: 100%; }
            .search-bar:focus { width: 100%; }
        }
    </style>
</head>
<body>

<div class="page-container">
    <aside class="sidebar">
        <div class="logo">
            <img src="/img/logoBleu.png" class="logo-img" alt="logo">
            <span>Eduphin</span>
        </div>
        <nav class="menu">
            <ul>
                <li><a href="#"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
                <li><a href="#"><i class="fa-solid fa-user"></i> <span>My Profile</span></a></li>
                <li class="active"><a href="#"><i class="fa-solid fa-plus-circle"></i> <span>Create Quiz</span></a></li>
                <li><a href="#"><i class="fa-solid fa-book"></i> <span>Create Course</span></a></li>
            </ul>
        </nav>
        <button class="logout-btn">Sign Out</button>
    </aside>

    <main class="main">
        <header class="main-header">
            <div>
                <h2>Create <span>New Quiz</span></h2>
                <p style="font-size: 13px; color: var(--text-muted);">Dashboard › Quiz Builder</p>
            </div>
            <div class="header-actions">
                <input type="text" id="searchQuizInput" class="search-bar" placeholder="Search saved quizzes...">
                <div class="buttons">
                    <button class="icon-btn">🔔</button>
                    <button class="icon-btn">💬</button>
                    <button class="icon-btn">👤</button>
                </div>
            </div>
        </header>

        <div class="quiz-grid">
            <!-- Question Builder Section -->
            <section class="quiz-card">
                <div class="section-title">
                    <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--orange);"></i>
                    Build Questions
                </div>

                <div class="field-group">
                    <label>Quiz Title *</label>
                    <input type="text" id="quizTitle" placeholder="e.g., JavaScript Fundamentals Quiz">
                </div>

                <div class="field-group">
                    <label>Question Text *</label>
                    <textarea id="questionText" rows="3" placeholder="Write your question clearly..."></textarea>
                </div>

                <label>Question Type</label>
                <div class="type-selector">
                    <div class="type-pill active" data-type="mcq">Multiple Choice</div>
                    <div class="type-pill" data-type="truefalse">True / False</div>
                    <div class="type-pill" data-type="short">Short Answer</div>
                </div>

                <div id="dynamicFields"></div>

                <div style="margin-top: 30px;">
                    <button id="addBtn" class="btn-primary">
                        <i class="fa-solid fa-plus"></i> Add Question to Bank
                    </button>
                </div>
            </section>

            <!-- Question Bank & Save Section -->
            <section class="quiz-card">
                <div class="section-title">
                    <i class="fa-solid fa-box-archive" style="color: var(--blue-main);"></i>
                    Question Bank 
                    <span id="questionsCount" style="font-size: 12px; background: var(--blue-light); padding: 4px 12px; border-radius: 20px; margin-right: auto;">0 Questions</span>
                </div>

                <div id="questionsList" style="max-height: 400px; overflow-y: auto; margin-bottom: 20px;">
                    <div class="empty-state">
                        <i class="fa-solid fa-layer-group" style="font-size: 40px; margin-bottom: 15px; opacity: 0.3;"></i>
                        <p>No questions added yet. Start by adding a question from the right panel.</p>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; flex-direction: column;">
                    <button id="saveQuizBtn" class="btn-success">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Save Quiz (Final)
                    </button>
                    <button id="clearAllBtn" class="btn-outline">
                        <i class="fa-solid fa-trash-can"></i> Clear All Questions
                    </button>
                </div>

                <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #e2edf7;">
                    <label style="font-size: 12px;">Import from JSON File</label>
                    <input type="file" id="loadQuizFile" style="font-size: 12px; padding: 8px; border-radius: 12px;">
                </div>
            </section>
        </div>
    </main>
</div>

<div id="toastMsg" class="fav-toast"></div>

<script>
    // Full quiz management logic with enhanced design matching the courses page
    let questions = [];
    let currentType = "mcq";

    function showToastMessage(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.background = isError ? '#b91c1c' : 'var(--navy)';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function updateDynamicFields() {
        const container = document.getElementById("dynamicFields");
        if (currentType === "mcq") {
            container.innerHTML = `
                <div class="field-group">
                    <label>Options (separate by commas) *</label>
                    <input type="text" id="mcqOptions" placeholder="Option 1, Option 2, Option 3">
                </div>
                <div class="field-group">
                    <label>Correct Answer (exact text) *</label>
                    <input type="text" id="mcqCorrect" placeholder="e.g., Option 1">
                </div>
            `;
        } else if (currentType === "truefalse") {
            container.innerHTML = `
                <div class="field-group">
                    <label>Correct Answer</label>
                    <select id="tfCorrect">
                        <option value="True">True</option>
                        <option value="False">False</option>
                    </select>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="field-group">
                    <label>Model Answer *</label>
                    <input type="text" id="shortCorrect" placeholder="Enter expected answer">
                </div>
            `;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderQuestionsList() {
        const container = document.getElementById("questionsList");
        const countSpan = document.getElementById("questionsCount");
        countSpan.innerText = `${questions.length} Questions`;

        if (questions.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-layer-group" style="font-size: 40px; margin-bottom: 15px; opacity: 0.3;"></i><p>No questions added yet. Start by adding a question from the right panel.</p></div>`;
            return;
        }

        container.innerHTML = "";
        questions.forEach((q, idx) => {
            const qDiv = document.createElement("div");
            qDiv.className = "question-item";
            let typeText = q.type === "mcq" ? "Multiple Choice" : (q.type === "truefalse" ? "True/False" : "Short Answer");
            let answerPreview = "";
            if (q.type === "mcq") answerPreview = `✅ Correct: ${q.correctAnswer}`;
            else if (q.type === "truefalse") answerPreview = `✅ Correct: ${q.correctAnswer === "True" ? "True" : "False"}`;
            else answerPreview = `✅ Model Answer: ${q.correctAnswer}`;
            
            qDiv.innerHTML = `
                <div class="question-header">
                    <span class="question-type-badge">${typeText}</span>
                    <button class="delete-question" data-index="${idx}"><i class="fa-solid fa-trash-can"></i></button>
                </div>
                <div style="font-weight: 600; margin-bottom: 8px;">Question: ${escapeHtml(q.text)}</div>
                <div style="font-size: 13px; color: #2b7de9;">${answerPreview}</div>
                ${q.type === "mcq" && q.options ? `<div style="font-size: 12px; color: #666; margin-top: 6px;">📋 Options: ${q.options.join(" | ")}</div>` : ""}
            `;
            container.appendChild(qDiv);
        });

        document.querySelectorAll(".delete-question").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = parseInt(btn.getAttribute("data-index"));
                questions.splice(idx, 1);
                renderQuestionsList();
                showToastMessage("Question deleted");
            });
        });
    }

    function addQuestion() {
        const questionText = document.getElementById("questionText").value.trim();
        if (!questionText) {
            showToastMessage("Please enter the question text", true);
            return;
        }

        let newQuestion = { text: questionText, type: currentType };
        
        if (currentType === "mcq") {
            const optionsRaw = document.getElementById("mcqOptions").value;
            const correctAns = document.getElementById("mcqCorrect").value.trim();
            if (!optionsRaw || !correctAns) {
                showToastMessage("Please fill in options and correct answer", true);
                return;
            }
            const optionsArr = optionsRaw.split(",").map(opt => opt.trim());
            if (optionsArr.length < 2) {
                showToastMessage("Please provide at least two options", true);
                return;
            }
            if (!optionsArr.includes(correctAns)) {
                showToastMessage("Correct answer must match one of the options", true);
                return;
            }
            newQuestion.options = optionsArr;
            newQuestion.correctAnswer = correctAns;
        } 
        else if (currentType === "truefalse") {
            const tfValue = document.getElementById("tfCorrect").value;
            newQuestion.correctAnswer = tfValue;
        } 
        else {
            const shortAns = document.getElementById("shortCorrect").value.trim();
            if (!shortAns) {
                showToastMessage("Please provide the model answer", true);
                return;
            }
            newQuestion.correctAnswer = shortAns;
        }
        
        questions.push(newQuestion);
        renderQuestionsList();
        document.getElementById("questionText").value = "";
        if (currentType === "mcq") {
            document.getElementById("mcqOptions").value = "";
            document.getElementById("mcqCorrect").value = "";
        } else if (currentType === "short") {
            document.getElementById("shortCorrect").value = "";
        }
        showToastMessage("Question added successfully");
    }

    function saveQuiz() {
        const quizTitle = document.getElementById("quizTitle").value.trim();
        if (!quizTitle) {
            showToastMessage("Please enter a quiz title", true);
            return;
        }
        if (questions.length === 0) {
            showToastMessage("Cannot save a quiz with no questions", true);
            return;
        }
        
        const quizData = {
            title: quizTitle,
            createdAt: new Date().toISOString(),
            totalQuestions: questions.length,
            questions: questions
        };
        
        const savedQuizzes = JSON.parse(localStorage.getItem("eduphin_quizzes") || "[]");
        savedQuizzes.push(quizData);
        localStorage.setItem("eduphin_quizzes", JSON.stringify(savedQuizzes));
        
        showToastMessage(`Quiz "${quizTitle}" saved successfully!`);
        questions = [];
        renderQuestionsList();
        document.getElementById("quizTitle").value = "";
    }
    
    function clearAll() {
        if (questions.length > 0 && confirm("Are you sure you want to delete all questions?")) {
            questions = [];
            renderQuestionsList();
            showToastMessage("All questions cleared");
        } else if (questions.length === 0) {
            showToastMessage("No questions to clear");
        }
    }

    function importFromJSON(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported) && imported.length) {
                    questions.push(...imported);
                    renderQuestionsList();
                    showToastMessage(`Imported ${imported.length} questions successfully`);
                } else if (imported.questions && Array.isArray(imported.questions)) {
                    questions.push(...imported.questions);
                    renderQuestionsList();
                    showToastMessage(`Imported ${imported.questions.length} questions from quiz file`);
                } else {
                    showToastMessage("Invalid file: must contain an array of questions", true);
                }
            } catch(err) {
                showToastMessage("Error reading file: invalid JSON format", true);
            }
        };
        reader.readAsText(file);
    }

    function searchQuizzes() {
        const keyword = document.getElementById("searchQuizInput").value.trim().toLowerCase();
        const saved = JSON.parse(localStorage.getItem("eduphin_quizzes") || "[]");
        if (keyword === "") {
            showToastMessage(`📚 Total saved quizzes: ${saved.length}`);
            return;
        }
        const filtered = saved.filter(q => q.title.toLowerCase().includes(keyword));
        if (filtered.length) {
            showToastMessage(`🔍 Found ${filtered.length} quiz(zes) matching "${keyword}"`);
        } else {
            showToastMessage(`❌ No quizzes found containing "${keyword}"`);
        }
    }
    
    document.addEventListener("DOMContentLoaded", () => {
        updateDynamicFields();
        
        document.querySelectorAll(".type-pill").forEach(pill => {
            pill.addEventListener("click", () => {
                document.querySelectorAll(".type-pill").forEach(p => p.classList.remove("active"));
                pill.classList.add("active");
                currentType = pill.getAttribute("data-type");
                updateDynamicFields();
            });
        });
        
        document.getElementById("addBtn").addEventListener("click", addQuestion);
        document.getElementById("saveQuizBtn").addEventListener("click", saveQuiz);
        document.getElementById("clearAllBtn").addEventListener("click", clearAll);
        
        const fileInput = document.getElementById("loadQuizFile");
        fileInput.addEventListener("change", (e) => {
            if (e.target.files.length) importFromJSON(e.target.files[0]);
            fileInput.value = "";
        });
        
        const searchInput = document.getElementById("searchQuizInput");
        searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchQuizzes();
        });
        
        renderQuestionsList();
    });
</script>
</body>
</html>
